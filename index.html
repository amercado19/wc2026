<!DOCTYPE html>
<html lang="en">
<head>
<script>
/* Freshness guard: GitHub Pages caches the HTML shell for ~10 min, so a just-deployed
   change can look "the same" on reload. Once per browser session, silently reload with a
   unique cache-busting key so you always land on the latest published version. Double-guarded
   (query marker + sessionStorage) so it can never loop. */
(function(){try{
  if(location.search.indexOf('fresh=')===-1 && !sessionStorage.getItem('wc_fresh')){
    sessionStorage.setItem('wc_fresh','1');
    location.replace(location.pathname+'?fresh='+Date.now()+location.hash);
  }
}catch(e){}})();
</script>

<style>

  .wrap{max-width:1180px;margin:0 auto;padding:24px 18px 80px}

// ---- client-side knockout win% (Elo->Poisson, neutral, draws excluded) ----
function _fact(n){let f=1;for(let i=2;i<=n;i++)f*=i;return f;}
function _pois(k,l){return Math.exp(-l)*Math.pow(l,k)/_fact(k);}
const UPSET_FACTOR=0.08;  // World Cup upset damping — keep in sync with simulate.py
function koProb(rA,rB){
  const sup=((rA-rB)/165)*(1-UPSET_FACTOR);
  const lamA=Math.max(0.18,2.65/2+sup/2), lamB=Math.max(0.18,2.65/2-sup/2);
  let pw=0,pl=0;
  for(let i=0;i<=8;i++)for(let j=0;j<=8;j++){const p=_pois(i,lamA)*_pois(j,lamB);
    if(i>j)pw+=p; else if(i<j)pl+=p;}
  const tot=pw+pl||1;
  return {pa:pw/tot, sa:Math.round(lamA), sb:Math.round(lamB)};
}

// ---- parlay builder ----
function poisGE(mean,k){let c=0;for(let i=0;i<k;i++)c+=_pois(i,mean);return Math.max(.001,Math.min(.999,1-c));}
function poisLE(mean,k){let c=0;for(let i=0;i<=k;i++)c+=_pois(i,mean);return Math.max(.001,Math.min(.999,c));}
function decOdds(p){return Math.round((1/p)*100)/100;}
function amOdds(p){const d=1/p;return d>=2?'+'+Math.round((d-1)*100):'−'+Math.round(100/(d-1));}
const SOT_PER_GOAL=3.1;
let plProfile='balanced';
const PL_RISK={safe:{band:[0.60,0.90],n:3},balanced:{band:[0.42,0.72],n:4},longshot:{band:[0.15,0.45],n:5}};
// odds-range + prop-type filters (auto mode); build mode keeps its own in plFlt
let plOddsMin=1.40, plOddsMax=2.40;   // balanced default; risk presets reset this
let plType={ml:true,draw:true,total:true,goals:true,sot:true,first:true};   // shared prop-type filter (both modes)
let plTier={strong:true,lean:true,weak:true};   // shared confidence-tier filter (both modes)
const TIER_LABELS=[['strong','Strong lean'],['lean','Lean'],['weak','Weak pick']];
const inOdds=(prob,mn,mx)=>{const o=1/prob; return o>=mn && o<=mx;};
const PRESET_ODDS={safe:[1.10,1.70],balanced:[1.40,2.40],longshot:[2.20,6.00]};

// Every leg is CONSISTENT with the model's prediction for that match — we never offer the
// side the model expects to lose, a draw it doesn't expect, or an over it doesn't expect to clear.
function buildLegs(){
  const ms=DATA.matches.filter(m=>m.status==='upcoming');
  const legs=[];
  ms.forEach(m=>{
    const lh=m.exp_home, la=m.exp_away, tot=lh+la, mid=m.home+' v '+m.away;
    const meta=m.home+' v '+m.away;
    const add=(o)=>{o.match=mid;o.home=m.home;o.away=m.away;o.group=m.group;o.date=m.date;
      o.teams=[m.home,m.away];o.id=o.type+'|'+mid+'|'+o.sel;legs.push(o);};
    const hw=m.home_win/100, aw=m.away_win/100, dw=m.draw/100;
    const drawPredicted = dw>=hw && dw>=aw;
    // MONEYLINE — only the side the model favours, and only when it predicts a win (not a draw)
    if(!drawPredicted){
      if(hw>=aw) add({type:'ml',sel:m.home+' to win',meta:meta+' · moneyline',prob:hw,subj:m.home});
      else       add({type:'ml',sel:m.away+' to win',meta:meta+' · moneyline',prob:aw,subj:m.away});
    }
    // DRAW — only when a draw IS the model's predicted result
    if(drawPredicted) add({type:'draw',sel:'Draw',meta:meta+' · match result',prob:dw});
    // TOTAL OVER — only lines the model expects to clear (line below the projected total)
    [1.5,2.5,3.5].forEach(line=>{ if(line<tot) add({type:'total',sel:'Over '+line+' total goals',
      meta:meta+' · total goals',prob:poisGE(tot,Math.ceil(line))}); });
    // GOALS — anytime goalscorer (either team; scoring doesn't contradict the predicted result)
    [['scorers_home',m.home],['scorers_away',m.away]].forEach(([key,team])=>{
      (m[key]||[]).slice(0,3).forEach(s=>add({type:'goals',sel:s.name+' to score',
        meta:team+' · '+meta,prob:s.pct/100,subj:team,player:s.name}));
    });
    // SHOTS ON TARGET — per player, 1–4 shots (over 0.5/1.5/2.5/3.5), share of team SOT
    [['scorers_home',m.home,lh],['scorers_away',m.away,la]].forEach(([key,team,lam])=>{
      const top=(m[key]||[]).slice(0,3); const wsum=top.reduce((a,s)=>a+(s.pct||0),0)||1;
      const teamSOT=lam*SOT_PER_GOAL;
      top.forEach(s=>{ const pSOT=Math.max(0.3, teamSOT*((s.pct||0)/wsum));
        [0.5,1.5,2.5,3.5].forEach(line=>add({type:'sot',sel:s.name+' over '+line+' shots on target',
          meta:team+' · '+meta,prob:poisGE(pSOT,Math.ceil(line)),subj:team,player:s.name})); });
    });
    // FIRST GOAL — only the side the model expects to open the scoring
    const pAny=1-Math.exp(-tot), share=lh/Math.max(0.01,lh+la);
    if(share>=0.5) add({type:'first',sel:m.home+' to score first',meta:meta+' · first goal',
      prob:Math.max(.05,Math.min(.93,pAny*share)),subj:m.home});
    else add({type:'first',sel:m.away+' to score first',meta:meta+' · first goal',
      prob:Math.max(.05,Math.min(.93,pAny*(1-share))),subj:m.away});
  });
  return legs;
}
// shared filtered pool + id lookup for the editable auto ticket
function legPool(){
  const allowed=plScopeDates();
  return buildLegs().filter(l=>(!allowed||allowed.has(l.date)) && (!plGames.size||plGames.has(l.match)));
}
function legById(id){ if(!id)return null; const all=buildLegs(); for(const l of all) if(l.id===id) return l; return null; }
function bestLegOfType(type){
  const used=new Set(plTicket||[]);
  const usedMatches=new Set((plTicket||[]).map(id=>{const l=legById(id);return l?l.match:null;}));
  let pool=legPool().filter(l=>l.type===type && !used.has(l.id) && inOdds(l.prob,plOddsMin,plOddsMax) && plTier[confTier(l.prob)[0]]);
  if(!pool.length) pool=legPool().filter(l=>l.type===type && !used.has(l.id));   // relax odds/tier if needed
  pool.sort((a,b)=> (usedMatches.has(a.match)?1:0)-(usedMatches.has(b.match)?1:0) || (b.prob-a.prob));
  return pool[0]||null;
}
// confidence tier from model probability
function confTier(p){return p>=0.62?['strong','Strong lean']:p>=0.45?['lean','Lean']:['weak','Weak pick'];}
function teamForm(){
  const f={}; let max=0.001;
  Object.values(DATA.groups||{}).forEach(rows=>rows.forEach(r=>{
    const v=(r.Pts||0)+0.5*(r.GD||0); f[r.name]=v; if(Math.abs(v)>max)max=Math.abs(v);}));
  const out={}; Object.keys(f).forEach(k=>out[k]=(f[k]/max+1)/2); return out; // 0..1
}
function hotSet(){const s=new Set();((DATA.players&&DATA.players.scorers)||[]).forEach(p=>{if(p.g>0)s.add(p.name);});return s;}
function legConf(l,form,hot){
  let mom=0;
  if((l.type==='goals'||l.type==='sot')&&l.player){ if(hot.has(l.player)) mom+=0.12; mom+=0.10*((form[l.subj]||0.5)-0.5); }
  else if(l.subj){ mom+=0.18*((form[l.subj]||0.5)-0.5); }
  else { mom+=0.10*((((form[l.home]||0.5)+(form[l.away]||0.5))/2)-0.5); }
  return Math.max(0.01,Math.min(0.999,l.prob*(1+mom)));
}
function legHot(l,form,hot){
  if((l.type==='goals'||l.type==='sot')&&l.player&&hot.has(l.player)) return '🔥';
  if(l.subj&&(form[l.subj]||0)>0.72) return '📈';
  return '';
}
function genParlay(){
  const cfg=PL_RISK[plProfile];
  const allowed=plScopeDates();
  let pool=buildLegs().filter(l=>(!allowed||allowed.has(l.date)) && plType[l.type]
    && (!plGames.size||plGames.has(l.match))
    && plTier[confTier(l.prob)[0]]
    && inOdds(l.prob,plOddsMin,plOddsMax));   // odds range is the band
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const picked=[],um=new Set(),ut={};
  for(const l of pool){if(picked.length>=cfg.n)break;if(um.has(l.match))continue;if((ut[l.type]||0)>=2)continue;
    picked.push(l);um.add(l.match);ut[l.type]=(ut[l.type]||0)+1;}
  if(picked.length<cfg.n){for(const l of pool){if(picked.length>=cfg.n)break;if(picked.includes(l))continue;
    if(um.has(l.match))continue;picked.push(l);um.add(l.match);}}
  return picked;
}

  const gameChips=`<div class="plscope"><span class="sclbl">Games</span>

      ${scopeMatches.map(m=>{const id=m.home+' v '+m.away;

function wireAuto(el){
  const fresh=()=>{plTicket=null;renderParlay();};   // filter change => regenerate the base ticket
  el.querySelectorAll('.pltabs button[data-prof]').forEach(b=>b.addEventListener('click',()=>{
    plProfile=b.dataset.prof; const o=PRESET_ODDS[plProfile]; plOddsMin=o[0]; plOddsMax=o[1]; fresh();
  }));
  el.querySelectorAll('.plscope button[data-scope]').forEach(b=>b.addEventListener('click',()=>{
    plScope=b.dataset.scope; plGames.clear();
    if(plScope==='custom'&&!plDays.size){const t=plToday();plDays=new Set([t]);}
    fresh();
  }));
  el.querySelectorAll('.daychip').forEach(b=>b.addEventListener('click',()=>{
    const d=b.dataset.day; if(plDays.has(d))plDays.delete(d); else plDays.add(d); plGames.clear(); fresh();
  }));
  el.querySelectorAll('.gamechip[data-game]').forEach(b=>b.addEventListener('click',()=>{
    const g=b.dataset.game;
    if(g==='__all'){plGames.clear();}
    else if(plGames.has(g)){plGames.delete(g);} else {plGames.add(g);}
    fresh();
  }));
  el.querySelectorAll('.gamechip[data-tier]').forEach(b=>b.addEventListener('click',()=>{
    const t=b.dataset.tier;
    if(plTier[t]&&Object.values(plTier).filter(Boolean).length===1) return;
    plTier[t]=!plTier[t]; fresh();
  }));
  el.querySelectorAll('input[data-atype]').forEach(c=>c.addEventListener('change',e=>{plType[e.target.dataset.atype]=e.target.checked;fresh();}));
  const amn=el.querySelector('#aoddmin'), amx=el.querySelector('#aoddmax');
  if(amn) amn.addEventListener('change',e=>{plOddsMin=Math.max(1,+e.target.value||1);fresh();});
  if(amx) amx.addEventListener('change',e=>{plOddsMax=Math.max(plOddsMin,+e.target.value||99);fresh();});
  const roll=el.querySelector('#plroll'); if(roll) roll.addEventListener('click',()=>{regenTicket();renderParlay();});
  // add a leg of a chosen type / remove a leg — your picks, kept consistent with the model
  el.querySelectorAll('.addlegbtn[data-addtype]').forEach(b=>b.addEventListener('click',()=>{
    const l=bestLegOfType(b.dataset.addtype); if(l){plTicket=plTicket||[];plTicket.push(l.id);} renderParlay();
  }));
  el.querySelectorAll('.legx[data-id]').forEach(b=>b.addEventListener('click',()=>{
    plTicket=(plTicket||[]).filter(id=>id!==b.dataset.id); renderParlay();
  }));
}

  let r=b.rounds.find(rd=>rd.matches.some(m=>m.a&&m.b&&!m.played)) || b.rounds[0];
  const playedCount=r.matches.filter(m=>m.played).length, total=r.matches.filter(m=>m.a&&m.b).length;

      ["Dani Olmo","Spain",6],["Achraf Hakimi","Morocco",6],["Rodrygo","Brazil",6],["Bruno Fernandes","Portugal",6],

async function recomputeLive(opts){

  let feed=null;
  try{ feed=await fetch(FEED_URL+'?_='+Date.now()).then(r=>r.json()); }catch(e){ feed=null; }
  try{ LINEUPS=await fetch('lineups.json?_='+Date.now()).then(r=>r.json()); }catch(e){ /* keep last-known lineups */ }
  try{ RATINGS=await fetch('player_ratings.json?_='+Date.now()).then(r=>r.json()); }catch(e){ /* keep last-known ratings */ }
  if(feed && STATIC){
    try{
      const resMap={};
      feed.matches.forEach(m=>{ if((m.group||'').startsWith('Group') && (m.score||{}).ft){
        const h=fname(m.team1),a=fname(m.team2);resMap[[h,a].sort().join('|')]={a:h,s:m.score.ft};}});
      const fix=STATIC.fixtures.map(f=>{const k=[f.home,f.away].sort().join('|');const o=Object.assign({},f);
        if(resMap[k]){const r=resMap[k];o.result=r.a===f.home?[r.s[0],r.s[1]]:[r.s[1],r.s[0]];}else o.result=null;return o;});
      const gl={};feed.matches.forEach(m=>{if(!((m.score||{}).ft))return;[['goals1',fname(m.team1)],['goals2',fname(m.team2)]].forEach(([key,tm])=>{
        (m[key]||[]).forEach(g=>{const nm=asciiName((g.name||'').replace('(pen)','').replace('(og)',''));if(!nm)return;
          if(!gl[nm])gl[nm]=[0,tm];gl[nm][0]++;});});});
      const scorers=Object.keys(gl).map(n=>({name:n,team:gl[n][1],g:gl[n][0],a:0})).sort((x,y)=>y.g-x.g);
      // ---- ACTUAL knockout results (by match num 73-104), incl ET/penalty winners ----
      KO_RESULTS={};
      feed.matches.forEach(m=>{const num=+m.num; if(!num||num<73||num>104)return;
        const s=m.score||{}; if(!s.ft)return; const t1=fname(m.team1),t2=fname(m.team2);
        let win=null, by='90 min';
        if(s.p){win=s.p[0]>s.p[1]?t1:t2; by='penalties';}
        else if(s.et){win=s.et[0]>s.et[1]?t1:(s.et[1]>s.et[0]?t2:null); by='extra time';}
        else {win=s.ft[0]>s.ft[1]?t1:(s.ft[1]>s.ft[0]?t2:null); by='90 min';}
        if(!win)return;
        KO_RESULTS[num]={winner:win, byTeam:{[t1]:s.ft[0],[t2]:s.ft[1]}, decidedBy:by,
          pens:s.p?{[t1]:s.p[0],[t2]:s.p[1]}:null};});
      const eng=ENG.make(STATIC);
      DATA=eng.assembleDATA(fix,scorers);
      renderAll();
      if(btn){btn.textContent='✓ Updated';setTimeout(()=>{btn.disabled=false;btn.textContent='⟳ Refresh scores';},1500);}
      return true;
    }catch(e){ console.warn('recompute failed',e); }
  }
  if(btn){btn.disabled=false;btn.textContent='⟳ Refresh scores';}
  return false;
}

function koFixtures(){
  const b=DATA.bracket; if(!b||!b.rounds) return {round:null,ties:[],results:[]};
  const results=[]; let round=null, ties=[];
  b.rounds.forEach(rd=>{ rd.matches.forEach(m=>{ if(m.a&&m.b&&m.played) results.push(Object.assign({round:rd.name},m)); }); });
  for(const rd of b.rounds){ const up=rd.matches.filter(m=>m.a&&m.b&&!m.played);
    if(up.length){ round=rd.name; ties=up.map(m=>Object.assign({round:rd.name},m)); break; } }

function teamPath(team,results){

    const opp=m.a===team?m.b:m.a, gf=m.a===team?m.sa:m.sb, ga=m.a===team?m.sb:m.sa;

  recomputeLive({silent:true});
