<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Live Predictor</title>
<style>
  :root{
    --bg:#0b1020; --panel:#141b30; --panel2:#1b2440; --line:#27314f;
    --txt:#e8edf7; --muted:#93a0bd; --accent:#3ddc97; --accent2:#ffcf5c;
    --win:#3ddc97; --draw:#8b97b6; --lose:#ff6b6b; --gold:#ffcf5c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#0b1020,#0d1226 60%);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 18px 80px}
  header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px;
    border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:8px}
  h1{font-size:26px;margin:0;letter-spacing:.3px}
  h1 span{color:var(--accent)}
  .meta{font-size:13px;color:var(--muted);text-align:right;line-height:1.5}
  .meta b{color:var(--txt)}
  nav{display:flex;gap:8px;margin:18px 0 22px;flex-wrap:wrap}
  nav button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
  nav button.active{background:var(--accent);color:#06121a;border-color:var(--accent)}
  nav button:hover{color:var(--txt)}
  section{display:none} section.active{display:block}
  /* title odds */
  .oddsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:6px}
  .odd{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
  .odd .bar{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(61,220,151,.22),rgba(61,220,151,.05));z-index:0}
  .odd .row{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center}
  .odd .tn{font-weight:700;font-size:15px}
  .odd .pc{font-weight:800;color:var(--accent);font-size:17px}
  .odd .sub{position:relative;z-index:1;font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
  .rk{display:inline-block;width:22px;color:var(--muted);font-size:12px}
  /* groups */
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .ghead{background:var(--panel2);padding:10px 14px;font-weight:800;letter-spacing:.5px;font-size:14px;
    display:flex;justify-content:space-between;align-items:center}
  .ghead .lbl{color:var(--muted);font-weight:600;font-size:11px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:6px 8px;text-align:center}
  th{color:var(--muted);font-weight:600;font-size:11px;border-bottom:1px solid var(--line)}
  td.t{text-align:left;font-weight:600}
  tr.q td{background:rgba(61,220,151,.06)}
  tr.q3 td{background:rgba(255,207,92,.06)}
  .adv{font-size:11px;color:var(--accent);font-weight:700}
  .matches{padding:8px 12px 14px}
  .mt{font-size:11px;color:var(--muted);margin:10px 2px 6px;text-transform:uppercase;letter-spacing:.6px}
  .m{display:flex;align-items:center;gap:8px;padding:8px 6px;border-top:1px solid var(--line);font-size:13px}
  .m .tm{flex:1}
  .m .tm.h{text-align:right} .m .tm.a{text-align:left}
  .m .sc{font-weight:800;min-width:48px;text-align:center;background:var(--panel2);border-radius:6px;padding:3px 0}
  .m .sc.proj{background:transparent;color:var(--muted);font-weight:700}
  .m.win-h .tm.h,.m.win-a .tm.a{color:var(--txt);font-weight:800}
  .wdl{display:flex;height:6px;border-radius:4px;overflow:hidden;width:100%;margin-top:4px}
  .wdl i{display:block;height:100%}
  .pcs{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px}
  .mwrap{padding:2px 4px}
  /* knockout */
  .kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .legend{font-size:12px;color:var(--muted);margin:4px 0 18px;line-height:1.6}
  .kbar{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .kbar .tn{font-weight:700;font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between}
  .kbar .tn small{color:var(--muted);font-weight:600}
  .stage{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:11px}
  .stage label{width:34px;color:var(--muted)}
  .stage .track{flex:1;background:var(--panel2);border-radius:4px;height:9px;overflow:hidden}
  .stage .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .stage .v{width:42px;text-align:right;color:var(--txt);font-weight:600}
  /* flags */
  .flag{width:19px;height:13px;object-fit:cover;border-radius:2px;flex:none;
    box-shadow:0 0 0 1px rgba(255,255,255,.12);vertical-align:middle}
  td.t .flag{margin-right:7px}
  .m .flag{width:17px;height:12px}
  .m .tm.h{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end}
  .m .tm.a{display:inline-flex;align-items:center;gap:6px}
  /* bracket */
  .bkscroll{overflow-x:auto;padding-bottom:14px;-webkit-overflow-scrolling:touch}
  .bk{display:flex;gap:26px;min-width:max-content;padding:4px 2px}
  .bkcol{display:flex;flex-direction:column;justify-content:space-around;min-width:188px}
  .bkcol h4{position:sticky;top:0;text-align:center;color:var(--muted);font-size:10.5px;
    letter-spacing:1.5px;text-transform:uppercase;margin:0 0 10px;font-weight:700}
  .tie{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;
    margin:6px 0;transition:.12s;position:relative}
  .tie::after{content:"";position:absolute;right:-26px;top:50%;width:26px;height:1px;
    background:var(--line)}
  .bkcol:nth-last-child(2) .tie::after,.bkcol:last-child .tie::after{display:none}
  .tie:hover{border-color:#3a466b}
  .tie .side{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:13px;cursor:pointer}
  .tie .side+.side{border-top:1px solid var(--line)}
  .tie .side.w{background:rgba(61,220,151,.10)}
  .tie .side.w .nm{font-weight:800;color:var(--txt)}
  .tie .seed{font-size:9px;font-weight:700;background:var(--panel2);border-radius:4px;
    padding:2px 5px;color:var(--muted);min-width:24px;text-align:center;flex:none}
  .tie .side.w .seed{background:rgba(61,220,151,.18);color:var(--accent)}
  .tie .nm{flex:1;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tie .pct{font-weight:700;font-size:11px;color:var(--muted);flex:none}
  .tie .side.w .pct{color:var(--accent)}
  .tie .pbar{height:3px;background:var(--lose);display:flex}
  .tie .pbar i{height:100%;background:var(--win)}
  .tie.dim{opacity:.28}
  .tie.lit{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .champ{background:linear-gradient(180deg,rgba(255,207,92,.18),var(--panel));
    border:1px solid var(--gold);border-radius:12px;padding:16px 14px;text-align:center;align-self:center}
  .champ .trophy{font-size:26px}
  .champ .lbl{font-size:10px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-top:4px}
  .champ .nm{font-size:19px;font-weight:800;margin-top:6px;display:flex;align-items:center;gap:8px;justify-content:center}
  .champ .nm .flag{width:26px;height:18px}
  .champ .tp{font-size:11px;color:var(--muted);margin-top:4px}
  .bkhint{font-size:12px;color:var(--muted);margin:2px 0 14px;line-height:1.6}
  .bkhint b{color:var(--txt)}
  .bklayout{display:flex;gap:18px;align-items:flex-start}
  @media(max-width:820px){.bklayout{flex-direction:column}}
  .projcol{flex:none;width:236px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:820px){.projcol{width:100%;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
  .projcol h4{grid-column:1/-1;margin:0 0 -2px;font-size:10.5px;letter-spacing:1px;
    text-transform:uppercase;color:var(--muted);font-weight:700}
  .pg{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .pg .gh{background:var(--panel2);padding:4px 8px;font-size:11px;font-weight:800;letter-spacing:.5px}
  .pg .pr{display:flex;align-items:center;gap:5px;padding:4px 8px;font-size:11px;border-top:1px solid var(--line)}
  .pg .pr .ps{width:13px;color:var(--muted);flex:none;text-align:center;font-size:10px}
  .pg .pr .pf{flex:none}
  .pg .pr .pnm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
  .pg .pr .ppt{flex:none;font-weight:700;color:var(--muted)}
  .pg .pr.q .pnm{color:var(--txt);font-weight:700}
  .pg .pr.q{background:rgba(61,220,151,.08)}
  .pg .pr.q3{background:rgba(255,207,92,.08)}
  .pg .pr.q3 .pnm{color:var(--gold)}
  .pg .pr .sd{font-size:8px;font-weight:700;color:var(--accent);flex:none}
  .bkscroll-wrap{flex:1;min-width:0}
  /* players */
  .pcols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:820px){.pcols{grid-template-columns:1fr}}
  .psec h3{font-size:14px;margin:0 0 4px}
  .psub{font-size:12px;color:var(--muted);margin:0 0 12px;line-height:1.5}
  .prow{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;margin-bottom:7px}
  .prow .rk{width:20px;color:var(--muted);font-size:12px;text-align:center;flex:none}
  .prow .pn{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    display:flex;align-items:center;gap:8px}
  .prow .pn small{color:var(--muted);font-weight:500}
  .prow .stat{font-size:12px;color:var(--muted);flex:none;text-align:right;min-width:64px}
  .prow .stat b{color:var(--txt);font-size:15px}
  .prow .ga{color:var(--accent);font-weight:800;font-size:16px;flex:none;min-width:24px;text-align:center}
  .badge2{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex:none}
  .b-ahead{background:rgba(61,220,151,.16);color:var(--accent)}
  .b-on{background:var(--panel2);color:var(--muted)}
  .b-behind{background:rgba(255,107,107,.16);color:var(--lose)}
  .pace{flex:none;width:84px}
  .pace .pl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:2px}
  .pace .tk{height:5px;background:var(--panel2);border-radius:3px;overflow:hidden;position:relative}
  .pace .tk i{position:absolute;left:0;top:0;height:100%;background:var(--accent)}
  .pace .tk u{position:absolute;top:-2px;width:2px;height:9px;background:var(--gold)}
  .pnote{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:6px}
  .note{font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px;margin-top:18px;line-height:1.6}
  .badge{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:6px;
    padding:2px 8px;font-size:11px;color:var(--muted);margin-left:6px}
  .loading{text-align:center;color:var(--muted);padding:60px}
</style>
</head>

</div>

 "Portugal":"pt","DR Congo":"cd","Uzbekistan":"uz","Colombia":"co",
 "England":"gb-eng","Croatia":"hr","Ghana":"gh","Panama":"pa"
};
function flag(name){
  const c=ISO[name]; if(!c) return '';
  return `<img class="flag" loading="lazy" src="https://flagcdn.com/${c}.svg" alt="">`;
}

function wdlBar(h,d,a){
  return `<div class="wdl">
    <i style="width:${h}%;background:var(--win)"></i>
    <i style="width:${d}%;background:var(--draw)"></i>
    <i style="width:${a}%;background:var(--lose)"></i></div>
    <div class="pcs"><span>${h}%</span><span>draw ${d}%</span><span>${a}%</span></div>`;
}

function renderGroups(){
  const g=DATA.groups, matches=DATA.matches;
  const order=Object.keys(g).sort();
  let html='<div class="groups">';
  for(const gid of order){
    const rows=g[gid];
    html+=`<div class="gcard"><div class="ghead">Group ${gid}<span class="lbl">Pld&nbsp;&nbsp;GD&nbsp;&nbsp;Pts&nbsp;&nbsp;·&nbsp;&nbsp;R16%</span></div>`;
    html+='<table><thead><tr><th class="t">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th><th>R16</th></tr></thead><tbody>';
    rows.forEach((r,i)=>{
      const cls=i<2?'q':(i===2?'q3':'');
      html+=`<tr class="${cls}"><td class="t"><span class="rk">${i+1}</span>${flag(r.name)}${r.name}</td>
        <td>${r.P}</td><td>${r.W}</td><td>${r.D}</td><td>${r.L}</td>
        <td>${r.GD>0?'+':''}${r.GD}</td><td><b>${r.Pts}</b></td>
        <td class="adv">${r.p_advance}%</td></tr>`;
    });
    html+='</tbody></table><div class="matches">';
    // matches for this group
    const ms=matches.filter(m=>m.group===gid);
    let md=0;
    ms.forEach((m,idx)=>{
      const round=Math.floor(idx/2)+1;
      if(round!==md){md=round;html+=`<div class="mt">Matchday ${md}</div>`;}
      if(m.status==='played'){
        const wc=m.result==='H'?'win-h':(m.result==='A'?'win-a':'');
        html+=`<div class="mwrap"><div class="m ${wc}">
          <span class="tm h">${m.home}${flag(m.home)}</span>
          <span class="sc">${m.score_home}–${m.score_away}</span>
          <span class="tm a">${flag(m.away)}${m.away}</span></div></div>`;
      }else{
        html+=`<div class="mwrap"><div class="m">
          <span class="tm h">${m.home}${flag(m.home)}</span>
          <span class="sc proj">${m.proj_home}–${m.proj_away}</span>
          <span class="tm a">${flag(m.away)}${m.away}</span></div>
          ${wdlBar(m.home_win,m.draw,m.away_win)}</div>`;
      }
    });
    html+='</div></div>';
  }
  html+='</div>';
  document.getElementById('groups').innerHTML=html;
}

function stageRow(lbl,v){
  return `<div class="stage"><label>${lbl}</label>
    <div class="track"><div class="fill" style="width:${Math.max(2,v)}%"></div></div>
    <span class="v">${v}%</span></div>`;
}
function renderKnockout(){
  const ts=DATA.teams.slice().sort((a,b)=>b.p_qf-a.p_qf).slice(0,24);
  let html=`<div class="legend">Probability each team reaches a given knockout round, from ${DATA.meta.n_sims.toLocaleString()} simulations.
    <span class="badge">R16 = out of group</span> Showing top 24 by quarter-final odds.</div><div class="kgrid">`;
  ts.forEach(t=>{
    html+=`<div class="kbar"><div class="tn"><span style="display:inline-flex;align-items:center;gap:7px">${flag(t.name)}${t.name}</span> <small>Grp ${t.group} · #${t.fifa_rank}</small></div>
      ${stageRow('R16',t.p_advance)}${stageRow('QF',t.p_qf)}${stageRow('SF',t.p_sf)}
      ${stageRow('Final',t.p_final)}${stageRow('Win',t.p_champion)}</div>`;
  });
  html+='</div>';
  document.getElementById('knockout').innerHTML=html;
}

function renderTitle(){
  const ts=DATA.teams.slice().sort((a,b)=>b.p_champion-a.p_champion);
  const max=ts[0].p_champion;
  let html='<div class="oddsgrid">';
  ts.forEach((t,i)=>{
    if(t.p_champion<0.05 && i>23) return;
    html+=`<div class="odd"><div class="bar" style="width:${(t.p_champion/max*100)}%"></div>
      <div class="row"><span class="tn"><span class="rk">${i+1}</span>${flag(t.name)} ${t.name}</span>
      <span class="pc">${t.p_champion}%</span></div>
      <div class="sub"><span>Grp ${t.group}</span><span>FIFA #${t.fifa_rank}</span>
      <span>SF ${t.p_sf}%</span><span>Final ${t.p_final}%</span></div></div>`;
  });
  html+='</div>';
  document.getElementById('title').innerHTML=html;
}

function projStandingsHTML(){
  const ps=DATA.bracket&&DATA.bracket.proj_standings;
  if(!ps) return '';
  let h='<div class="projcol"><h4>Projected final standings</h4>';
  Object.keys(ps).sort().forEach(g=>{
    h+=`<div class="pg"><div class="gh">Group ${g}</div>`;
    ps[g].forEach(r=>{
      const cls=r.pos<=2?'q':(r.adv?'q3':'');
      h+=`<div class="pr ${cls}"><span class="ps">${r.pos}</span>${flag(r.name)}
        <span class="pnm">${r.name}</span>
        ${r.seed?`<span class="sd">${r.seed}</span>`:''}
        <span class="ppt">${r.pts}</span></div>`;
    });
    h+=`</div>`;
  });
  h+='</div>';
  return h;
}

function renderBracket(){
  const b=DATA.bracket;
  if(!b){document.getElementById('bracket').innerHTML='<div class="loading">No bracket data.</div>';return;}
  const code={}; DATA.teams.forEach(t=>code[t.name]=t);
  const champPct=(n)=>{const t=code[n];return t?t.p_champion:0;};
  let html=`<div class="bkhint"><b>Projected bracket.</b> Likeliest qualifiers seeded into the knockout
    tree — the chip on each team is its projected group finish (<b>1A</b>=wins Group A, <b>2B</b>=runner-up B,
    <b>3C</b>=third). Each tie shows the model's win %; the bar under it is the win split, and hovering a tie
    shows the projected scoreline. <b>Tap any team to light up its path to the final.</b> Only
    ${DATA.meta.matches_played}/${DATA.meta.matches_total} group games are played, so pairings firm up as
    results land. Scroll sideways →</div>
    <div class="bklayout">${projStandingsHTML()}<div class="bkscroll-wrap"><div class="bkscroll"><div class="bk" id="bktree">`;
  b.rounds.forEach((round,ri)=>{
    html+=`<div class="bkcol"><h4>${b.round_names[ri]}</h4>`;
    round.forEach(m=>{
      const aw=m.winner===m.a, bw=m.winner===m.b;
      const cell=(name,seed,pct,win)=>`<div class="side ${win?'w':''}" data-team="${name}">
        ${flag(name)}<span class="seed">${seed||'&nbsp;'}</span>
        <span class="nm">${name}</span><span class="pct">${pct}%</span></div>`;
      const tip=`Projected: ${m.a} ${m.sa}–${m.sb} ${m.b}`;
      html+=`<div class="tie" title="${tip}">${cell(m.a,m.la,m.pa,aw)}${cell(m.b,m.lb,m.pb,bw)}
        <div class="pbar"><i style="width:${m.pa}%"></i></div></div>`;
    });
    html+=`</div>`;
  });
  html+=`<div class="bkcol"><h4>Winner</h4><div class="champ">
    <div class="trophy">🏆</div><div class="lbl">Projected champion</div>
    <div class="nm">${flag(b.champion)}${b.champion}</div>
    <div class="tp">${champPct(b.champion)}% to win it all</div></div></div>`;
  html+=`</div></div></div></div>`;
  const sec=document.getElementById('bracket');
  sec.innerHTML=html;
  // tap-to-highlight path
  let active=null;
  sec.querySelectorAll('.side').forEach(s=>{
    s.addEventListener('click',()=>{
      const t=s.dataset.team;
      if(active===t){active=null;clearLit();return;}
      active=t; clearLit();
      sec.querySelectorAll('.tie').forEach(tie=>{
        const has=[...tie.querySelectorAll('.side')].some(x=>x.dataset.team===t);
        tie.classList.add(has?'lit':'dim');
      });
    });
  });
  function clearLit(){sec.querySelectorAll('.tie').forEach(t=>t.classList.remove('lit','dim'));}
}

function renderPlayers(){
  const p=DATA.players;
  const el=document.getElementById('players');
  if(!p){el.innerHTML='<div class="loading">No player data.</div>';return;}
  // Golden Boot board
  const sc=p.scorers.slice().sort((a,b)=>b.g-a.g||b.a-a.a);
  let board='';
  sc.forEach((s,i)=>{
    board+=`<div class="prow"><span class="rk">${i+1}</span>
      <span class="pn">${flag(s.team)} ${s.name} <small>${s.team}</small></span>
      <span class="ga">${s.g}</span>
      <span class="stat">${s.a} ast</span></div>`;
  });
  // Star tracker
  const stars=p.stars.slice().sort((a,b)=>(b.g-b.exp_now)-(a.g-a.exp_now));
  let track='';
  stars.forEach(s=>{
    const cap=Math.max(s.proj_g,s.g,1);
    const gpos=Math.min(100,s.g/cap*100), ppos=Math.min(100,s.proj_g/cap*100);
    const bl=s.status==='ahead'?'b-ahead':(s.status==='behind'?'b-behind':'b-on');
    const lbl=s.status==='ahead'?'ahead':(s.status==='behind'?'behind':'on pace');
    track+=`<div class="prow"><span class="pn">${flag(s.team)} ${s.name} <small>${s.team} · ${s.team_gp}/3</small></span>
      <span class="badge2 ${bl}">${lbl}</span>
      <div class="pace"><div class="pl"><span>${s.g}g</span><span>proj ${s.proj_g}</span></div>
        <div class="tk"><i style="width:${gpos}%"></i><u style="left:${ppos}%"></u></div></div></div>`;
  });
  el.innerHTML=`
    <div class="psub">Live tournament numbers, refreshed as games finish. <b>Goals/assists are real;</b>
    the star tracker compares each player's goals to my pre-tournament projection (gold tick = full group-stage
    projection, green bar = actual), flagging who's <span style="color:var(--accent)">ahead</span> or
    <span style="color:var(--lose)">behind</span> pace. As-of ${p.as_of}.</div>
    <div class="pcols">
      <div class="psec"><h3>🥇 Golden Boot race</h3>
        <div class="psub">Top scorers across all 48 teams.</div>${board}</div>
      <div class="psec"><h3>⭐ Star tracker — projected vs actual</h3>
        <div class="psub">Sorted by who's most over their projection.</div>${track}
        <div class="pnote"><b>Why not every player?</b> No free data source carries club+country stats and a
        projection for all ~1,250 players. This tracks the stars with set projections plus every player who has
        scored/assisted. The scheduled task keeps these numbers current.</div></div>
    </div>`;
}

function renderMeta(){
  const m=DATA.meta;
  const d=new Date(m.generated);
  document.getElementById('meta').innerHTML=
    `Favourite: <b>${m.favourite}</b> (${m.favourite_pct}%)<br>
     ${m.matches_played}/${m.matches_total} group games played
     <span class="badge">${m.n_sims.toLocaleString()} sims</span><br>
     <span style="font-size:11px">updated ${d.toUTCString().replace('GMT','UTC')}</span>`;
  document.getElementById('footnote').innerHTML=
    `<b>How it works.</b> Each team has a base strength (FIFA rank + Elo) plus hand-tuned
     adjustments for formation, squad depth, playstyle, captaincy and endurance, and a
     per-venue heat/altitude factor based on the climate each side is used to. Rating gaps
     convert to expected goals (Poisson) for per-game win % and projected scores; a
     ${m.n_sims.toLocaleString()}-run Monte-Carlo plays out every remaining game to get
     group and knockout odds. Knockout pairings are seeded by simulated strength
     (a model bracket, not FIFA's exact slot map). Played results override predictions and the
     whole model re-fits each time results update.`;
}

function showTab(id){
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  document.querySelectorAll('section').forEach(s=>s.classList.toggle('active',s.id===id));
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));

function boot(){
  try{
    DATA=JSON.parse(document.getElementById('wc-data').textContent);
    renderMeta();renderGroups();renderBracket();renderPlayers();renderKnockout();renderTitle();
  }catch(e){
    document.getElementById('groups').innerHTML=
      '<div class="loading">No data baked in — run <code>python simulate.py</code> to generate index.html.</div>';
  }
}
boot();
</script>
</body>
</html>
