<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 — Live Predictor</title>
<style>
  :root{
    --bg:#0b1020; --panel:#141b30; --panel2:#1b2440; --line:#27314f;
    --txt:#e8edf7; --muted:#93a0bd; --accent:#3ddc97; --accent2:#ffcf5c;
    --win:#3ddc97; --draw:#8b97b6; --lose:#ff6b6b; --gold:#ffcf5c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(180deg,#0b1020,#0d1226 60%);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 18px 80px}
  header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px;
    border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:8px}
  h1{font-size:26px;margin:0;letter-spacing:.3px}
  h1 span{color:var(--accent)}
  .meta{font-size:13px;color:var(--muted);text-align:right;line-height:1.5}
  .meta b{color:var(--txt)}
  nav{display:flex;gap:8px;margin:18px 0 22px;flex-wrap:wrap}
  nav button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px;font-weight:600;transition:.15s}
  nav button.active{background:var(--accent);color:#06121a;border-color:var(--accent)}
  nav button:hover{color:var(--txt)}
  section{display:none} section.active{display:block}
  /* title odds */
  .oddsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:6px}
  .odd{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
  .odd .bar{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(61,220,151,.22),rgba(61,220,151,.05));z-index:0}
  .odd .row{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center}
  .odd .tn{font-weight:700;font-size:15px}
  .odd .pc{font-weight:800;color:var(--accent);font-size:17px}
  .odd .sub{position:relative;z-index:1;font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
  .rk{display:inline-block;width:22px;color:var(--muted);font-size:12px}
  /* groups */
  .groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .ghead{background:var(--panel2);padding:10px 14px;font-weight:800;letter-spacing:.5px;font-size:14px;
    display:flex;justify-content:space-between;align-items:center}
  .ghead .lbl{color:var(--muted);font-weight:600;font-size:11px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:6px 8px;text-align:center}
  th{color:var(--muted);font-weight:600;font-size:11px;border-bottom:1px solid var(--line)}
  td.t{text-align:left;font-weight:600}
  tr.q td{background:rgba(61,220,151,.06)}
  tr.q3 td{background:rgba(255,207,92,.06)}
  .adv{font-size:11px;color:var(--accent);font-weight:700}
  .mom{font-size:9px;margin-left:5px;vertical-align:middle}
  .mom.up{color:var(--win)} .mom.dn{color:var(--lose)}
  .matches{padding:8px 12px 14px}
  .mt{font-size:11px;color:var(--muted);margin:10px 2px 6px;text-transform:uppercase;letter-spacing:.6px}
  .m{display:flex;align-items:center;gap:8px;padding:8px 6px;border-top:1px solid var(--line);font-size:13px}
  .m .tm{flex:1}
  .m .tm.h{text-align:right} .m .tm.a{text-align:left}
  .m .sc{font-weight:800;min-width:48px;text-align:center;background:var(--panel2);border-radius:6px;padding:3px 0}
  .m .sc.proj{background:transparent;color:var(--muted);font-weight:700}
  .m.win-h .tm.h,.m.win-a .tm.a{color:var(--txt);font-weight:800}
  .wdl{display:flex;height:6px;border-radius:4px;overflow:hidden;width:100%;margin-top:4px}
  .wdl i{display:block;height:100%}
  .pcs{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px}
  .mwrap{padding:2px 4px}
  /* knockout */
  .kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .legend{font-size:12px;color:var(--muted);margin:4px 0 18px;line-height:1.6}
  .kbar{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .kbar .tn{font-weight:700;font-size:14px;margin-bottom:8px;display:flex;justify-content:space-between}
  .kbar .tn small{color:var(--muted);font-weight:600}
  .stage{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:11px}
  .stage label{width:34px;color:var(--muted)}
  .stage .track{flex:1;background:var(--panel2);border-radius:4px;height:9px;overflow:hidden}
  .stage .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .stage .v{width:42px;text-align:right;color:var(--txt);font-weight:600}
  /* flags */
  .flag{width:19px;height:13px;object-fit:cover;border-radius:2px;flex:none;
    box-shadow:0 0 0 1px rgba(255,255,255,.12);vertical-align:middle}
  td.t .flag{margin-right:7px}
  .m .flag{width:17px;height:12px}
  .m .tm.h{display:inline-flex;align-items:center;gap:6px;justify-content:flex-end}
  .m .tm.a{display:inline-flex;align-items:center;gap:6px}
  /* bracket */
  .bkscroll{overflow-x:auto;padding-bottom:14px;-webkit-overflow-scrolling:touch}
  .bk{display:flex;gap:26px;min-width:max-content;padding:4px 2px}
  .bkcol{display:flex;flex-direction:column;justify-content:space-around;min-width:188px}
  .bkcol h4{position:sticky;top:0;text-align:center;color:var(--muted);font-size:10.5px;
    letter-spacing:1.5px;text-transform:uppercase;margin:0 0 10px;font-weight:700}
  .tie{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;
    margin:6px 0;transition:.12s;position:relative}
  .tie::after{content:"";position:absolute;right:-26px;top:50%;width:26px;height:1px;
    background:var(--line)}
  .bkcol:nth-last-child(2) .tie::after,.bkcol:last-child .tie::after{display:none}
  .tie:hover{border-color:#3a466b}
  .bktools{display:flex;align-items:center;gap:14px;margin:0 0 14px;flex-wrap:wrap;font-size:12px}
  .bktools button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:6px 13px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
  .bktools button:hover{border-color:var(--accent);color:var(--accent)}
  .bkcount{color:var(--muted)}
  .bklegend{color:var(--muted);display:inline-flex;align-items:center;gap:5px;margin-left:auto}
  .bklegend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .bklegend .lg-model{background:var(--accent)} .bklegend .lg-mine{background:var(--gold)}
  .tie .side{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:13px;cursor:pointer}
  .tie .side+.side{border-top:1px solid var(--line)}
  .tie .side.w{background:rgba(61,220,151,.10)}
  .tie .side.w .nm{font-weight:800;color:var(--txt)}
  .tie .seed{font-size:9px;font-weight:700;background:var(--panel2);border-radius:4px;
    padding:2px 5px;color:var(--muted);min-width:24px;text-align:center;flex:none}
  .tie .side.w .seed{background:rgba(61,220,151,.18);color:var(--accent)}
  .tie .nm{flex:1;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tie .pct{font-weight:700;font-size:11px;color:var(--muted);flex:none}
  .tie .side.w .pct{color:var(--accent)}
  .tie .pbar{height:3px;background:var(--lose);display:flex}
  .tie .pbar i{height:100%;background:var(--win)}
  .tie.dim{opacity:.28}
  .tie.lit{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .tie.manual{border-color:var(--gold)}
  .tie .side.w.mine{background:rgba(255,207,92,.12)}
  .tie .side.w.mine .nm,.tie .side.w.mine .pct{color:var(--gold)}
  .tie .side.w.mine .seed{background:rgba(255,207,92,.18);color:var(--gold)}
  .tie .pk{color:var(--gold);font-weight:800;font-size:11px}
  .champ.cmine{border-color:var(--gold);background:linear-gradient(180deg,rgba(255,207,92,.26),var(--panel))}
  .champ{background:linear-gradient(180deg,rgba(255,207,92,.18),var(--panel));
    border:1px solid var(--gold);border-radius:12px;padding:16px 14px;text-align:center;align-self:center}
  .champ .trophy{font-size:26px}
  .champ .lbl{font-size:10px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;margin-top:4px}
  .champ .nm{font-size:19px;font-weight:800;margin-top:6px;display:flex;align-items:center;gap:8px;justify-content:center}
  .champ .nm .flag{width:26px;height:18px}
  .champ .tp{font-size:11px;color:var(--muted);margin-top:4px}
  .bkhint{font-size:12px;color:var(--muted);margin:2px 0 14px;line-height:1.6}
  .bkhint b{color:var(--txt)}
  .bklayout{display:flex;gap:18px;align-items:flex-start}
  @media(max-width:820px){.bklayout{flex-direction:column}}
  .projcol{flex:none;width:236px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:820px){.projcol{width:100%;grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
  .projcol h4{grid-column:1/-1;margin:0 0 -2px;font-size:10.5px;letter-spacing:1px;
    text-transform:uppercase;color:var(--muted);font-weight:700}
  .pg{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .pg .gh{background:var(--panel2);padding:4px 8px;font-size:11px;font-weight:800;letter-spacing:.5px}
  .pg .pr{display:flex;align-items:center;gap:5px;padding:4px 8px;font-size:11px;border-top:1px solid var(--line)}
  .pg .pr .ps{width:13px;color:var(--muted);flex:none;text-align:center;font-size:10px}
  .pg .pr .pf{flex:none}
  .pg .pr .pnm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
  .pg .pr .ppt{flex:none;font-weight:700;color:var(--muted)}
  .pg .pr.q .pnm{color:var(--txt);font-weight:700}
  .pg .pr.q{background:rgba(61,220,151,.08)}
  .pg .pr.q3{background:rgba(255,207,92,.08)}
  .pg .pr.q3 .pnm{color:var(--gold)}
  .pg .pr .sd{font-size:8px;font-weight:700;color:var(--accent);flex:none}
  .bkscroll-wrap{flex:1;min-width:0}
  /* players */
  .pcols{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:820px){.pcols{grid-template-columns:1fr}}
  .psec h3{font-size:14px;margin:0 0 4px}
  .psub{font-size:12px;color:var(--muted);margin:0 0 12px;line-height:1.5}
  .prow{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;margin-bottom:7px}
  .prow .rk{width:20px;color:var(--muted);font-size:12px;text-align:center;flex:none}
  .prow .pn{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    display:flex;align-items:center;gap:8px}
  .prow .pn small{color:var(--muted);font-weight:500}
  .prow .stat{font-size:12px;color:var(--muted);flex:none;text-align:right;min-width:64px}
  .prow .stat b{color:var(--txt);font-size:15px}
  .prow .ga{color:var(--accent);font-weight:800;font-size:16px;flex:none;min-width:24px;text-align:center}
  .badge2{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex:none}
  .b-ahead{background:rgba(61,220,151,.16);color:var(--accent)}
  .b-on{background:var(--panel2);color:var(--muted)}
  .b-behind{background:rgba(255,107,107,.16);color:var(--lose)}
  .pace{flex:none;width:84px}
  .pace .pl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:2px}
  .pace .tk{height:5px;background:var(--panel2);border-radius:3px;overflow:hidden;position:relative}
  .pace .tk i{position:absolute;left:0;top:0;height:100%;background:var(--accent)}
  .pace .tk u{position:absolute;top:-2px;width:2px;height:9px;background:var(--gold)}
  .pnote{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:6px}
  /* upcoming */
  .upsub{font-size:12px;color:var(--muted);margin:0 0 16px;line-height:1.6}
  .upsub b{color:var(--txt)}
  .uptoggle{margin-left:8px;background:var(--panel2);border:1px solid var(--line);color:var(--accent);
    border-radius:7px;padding:4px 10px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap}
  .uptoggle:hover{border-color:var(--accent)}
  .udate{font-size:14px;font-weight:800;color:var(--txt);margin:22px 0 12px;padding-bottom:7px;
    border-bottom:1px solid var(--line);letter-spacing:.3px}
  .udate:first-of-type{margin-top:4px}
  .ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
  .ucard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .uhead{background:var(--panel2);padding:9px 13px;display:flex;justify-content:space-between;
    align-items:center;font-size:11px;color:var(--muted)}
  .uhead .ug{font-weight:700;color:var(--txt)}
  .upset{font-size:10px;font-weight:700;color:var(--gold);background:rgba(255,207,92,.14);
    border-radius:20px;padding:2px 8px;margin-left:6px}
  .uteams{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 10px 8px}
  .uteams .ut{display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px;flex:1}
  .uteams .ut.h{justify-content:flex-end} .uteams .ut.a{justify-content:flex-start}
  .uteams .usc{font-weight:800;font-size:16px;color:var(--accent2);min-width:48px;text-align:center}
  .uwdl{display:flex;height:6px;margin:0 13px;border-radius:4px;overflow:hidden}
  .uwdl i{display:block} .uwdl .w{background:var(--win)} .uwdl .d{background:var(--draw)} .uwdl .l{background:var(--lose)}
  .uwpc{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin:4px 13px 0}
  .uscorers{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);margin-top:12px}
  .uscol{background:var(--panel);padding:9px 12px}
  .uscol h5{margin:0 0 7px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:6px}
  .sr{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:5px}
  .sr .sn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
  .sr:first-of-type .sn{color:var(--txt);font-weight:600}
  .sr .sp{font-weight:700;color:var(--accent);flex:none;font-size:11px}
  .sr .sb{flex:none;width:38px;height:4px;background:var(--panel2);border-radius:2px;overflow:hidden}
  .sr .sb i{display:block;height:100%;background:var(--accent)}
  /* parlay */
  .plsub{font-size:12px;color:var(--muted);margin:0 0 14px;line-height:1.6}
  .plsub b{color:var(--txt)}
  .plscope{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .plscope .sclbl{font-size:12px;color:var(--muted);font-weight:600;margin-right:2px}
  .plscope button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600}
  .plscope button.on{background:var(--accent2);color:#1a1205;border-color:var(--accent2)}
  .plscope .sccount{font-size:11px;color:var(--muted);margin-left:auto}
  .daychips{display:flex;gap:6px;flex-wrap:wrap;margin:-4px 0 14px}
  .daychip{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:5px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600}
  .daychip.on{background:rgba(255,207,92,.16);color:var(--accent2);border-color:var(--accent2)}
  .pltabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
  .pltabs button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:8px 15px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700}
  .pltabs button.on{background:var(--accent);color:#06121a;border-color:var(--accent)}
  .pltabs .roll{margin-left:auto;background:var(--panel2);color:var(--txt)}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;max-width:680px}
  .pcard .ph{background:var(--panel2);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
  .pcard .ph .pt{font-weight:800;font-size:15px}
  .pcard .ph .po{text-align:right}
  .pcard .ph .po .od{font-size:22px;font-weight:800;color:var(--accent2);line-height:1}
  .pcard .ph .po .im{font-size:11px;color:var(--muted)}
  .leg{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--line)}
  .leg .lk{flex:none;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    padding:3px 7px;border-radius:5px;width:74px;text-align:center}
  .lk-ml{background:rgba(61,220,151,.16);color:var(--accent)}
  .lk-goals{background:rgba(255,207,92,.16);color:var(--gold)}
  .lk-scorer{background:rgba(139,151,182,.2);color:#aeb9d6}
  .lk-sot{background:rgba(108,140,255,.18);color:#8ea2ff}
  .leg .ld{flex:1;min-width:0}
  .leg .ld .ls{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .leg .ld .lm{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .leg .lp{flex:none;text-align:right}
  .leg .lp .lpct{font-weight:800;font-size:14px}
  .leg .lp .lod{font-size:11px;color:var(--muted)}
  .pcard .pf{padding:11px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);
    display:flex;justify-content:space-between;background:rgba(255,255,255,.02)}
  .pcard .pf b{color:var(--txt)}
  .pwarn{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:14px;max-width:680px}
  .pwarn b{color:var(--lose)}
  .plmode{display:flex;gap:8px;margin-bottom:14px}
  .plmode button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:8px 16px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700}
  .plmode button.on{background:var(--accent);color:#06121a;border-color:var(--accent)}
  .bldwrap{display:flex;gap:16px;align-items:flex-start}
  @media(max-width:880px){.bldwrap{flex-direction:column}.slip{width:100%!important;position:static!important}}
  .bldmain{flex:1;min-width:0}
  .fltbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .fltbar select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:7px;
    padding:6px 9px;font-size:12px;font-weight:600}
  .fltbar .mks{display:flex;gap:9px;flex-wrap:wrap}
  .fltbar .ck{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:4px;cursor:pointer}
  .oddsin{width:52px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    border-radius:6px;padding:5px 6px;font-size:12px;font-weight:600}
  .oddsrng{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:12px}
  .plscope .oddsin{margin:0 2px}
  .proplist{display:flex;flex-direction:column;gap:6px;max-height:560px;overflow-y:auto;padding-right:4px}
  .prow2{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:9px;padding:8px 11px}
  .prow2 .pd{flex:1;min-width:0}
  .prow2 .ps2{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow2 .pm2{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow2 .pp2{flex:none;text-align:right}

// ---- client-side knockout win% (Elo->Poisson, neutral, draws excluded) ----
function _fact(n){let f=1;for(let i=2;i<=n;i++)f*=i;return f;}
function _pois(k,l){return Math.exp(-l)*Math.pow(l,k)/_fact(k);}
const UPSET_FACTOR=0.11;  // World Cup upset damping — keep in sync with simulate.py
function koProb(rA,rB){
  const sup=((rA-rB)/165)*(1-UPSET_FACTOR);
  const lamA=Math.max(0.18,2.65/2+sup/2), lamB=Math.max(0.18,2.65/2-sup/2);
  let pw=0,pl=0;
  for(let i=0;i<=8;i++)for(let j=0;j<=8;j++){const p=_pois(i,lamA)*_pois(j,lamB);
    if(i>j)pw+=p; else if(i<j)pl+=p;}
  const tot=pw+pl||1;
  return {pa:pw/tot, sa:Math.round(lamA), sb:Math.round(lamB)};
}

    b.rounds.forEach(rnd=>{

// ---- parlay builder ----
function poisGE(mean,k){let c=0;for(let i=0;i<k;i++)c+=_pois(i,mean);return Math.max(.001,Math.min(.999,1-c));}
function poisLE(mean,k){let c=0;for(let i=0;i<=k;i++)c+=_pois(i,mean);return Math.max(.001,Math.min(.999,c));}
function decOdds(p){return Math.round((1/p)*100)/100;}
function amOdds(p){const d=1/p;return d>=2?'+'+Math.round((d-1)*100):'−'+Math.round(100/(d-1));}
const SOT_PER_GOAL=3.1;
let plProfile='balanced';
const PL_RISK={safe:{band:[0.60,0.90],n:3},balanced:{band:[0.42,0.72],n:4},longshot:{band:[0.15,0.45],n:5}};
// odds-range + prop-type filters (auto mode); build mode keeps its own in plFlt
let plOddsMin=1.40, plOddsMax=2.40;   // balanced default; risk presets reset this
let plType={ml:true,goals:true,scorer:true,sot:true};   // shared prop-type filter (both modes)
const inOdds=(prob,mn,mx)=>{const o=1/prob; return o>=mn && o<=mx;};
const PRESET_ODDS={safe:[1.10,1.70],balanced:[1.40,2.40],longshot:[2.20,6.00]};

function buildLegs(){
  const ms=DATA.matches.filter(m=>m.status==='upcoming');
  const legs=[];
  ms.forEach(m=>{
    const lh=m.exp_home, la=m.exp_away, tot=lh+la, mid=m.home+' v '+m.away;
    const meta=m.home+' v '+m.away;
    const add=(o)=>{o.match=mid;o.home=m.home;o.away=m.away;o.group=m.group;o.date=m.date;
      o.teams=[m.home,m.away];o.id=o.type+'|'+mid+'|'+o.sel;legs.push(o);};
    const favHome=m.home_win>=m.away_win, fav=favHome?m.home:m.away, mlP=(favHome?m.home_win:m.away_win)/100;
    add({type:'ml',sel:fav+' to win',meta,prob:mlP,subj:fav});
    add({type:'ml',sel:fav+' or draw',meta:meta+' · double chance',prob:Math.min(.97,mlP+m.draw/100),subj:fav});
    [['Over',1.5],['Over',2.5],['Under',2.5],['Under',3.5]].forEach(([dir,line])=>{
      const k=Math.ceil(line);
      const p=dir==='Over'?poisGE(tot,k):poisLE(tot,k-1);
      add({type:'goals',sel:dir+' '+line+' goals',meta:meta+' · total goals',prob:p});
    });
    [['scorers_home',m.home],['scorers_away',m.away]].forEach(([key,team])=>{
      (m[key]||[]).slice(0,3).forEach(s=>add({type:'scorer',sel:s.name+' to score',
        meta:team+' · '+meta,prob:s.pct/100,subj:team,player:s.name}));
    });
    [[lh,m.home],[la,m.away]].forEach(([lam,team])=>{
      const sm=lam*SOT_PER_GOAL;
      [3.5,4.5,5.5].forEach(line=>add({type:'sot',sel:team+' over '+line+' shots on target',
        meta:meta+' · modeled SOT',prob:poisGE(sm,Math.ceil(line)),subj:team}));
    });
  });
  return legs;
}
function teamForm(){
  const f={}; let max=0.001;
  Object.values(DATA.groups||{}).forEach(rows=>rows.forEach(r=>{
    const v=(r.Pts||0)+0.5*(r.GD||0); f[r.name]=v; if(Math.abs(v)>max)max=Math.abs(v);}));
  const out={}; Object.keys(f).forEach(k=>out[k]=(f[k]/max+1)/2); return out; // 0..1
}
function hotSet(){const s=new Set();((DATA.players&&DATA.players.scorers)||[]).forEach(p=>{if(p.g>0)s.add(p.name);});return s;}
function legConf(l,form,hot){
  let mom=0;
  if(l.type==='scorer'){ if(hot.has(l.player)) mom+=0.12; mom+=0.10*((form[l.subj]||0.5)-0.5); }
  else if(l.subj){ mom+=0.18*((form[l.subj]||0.5)-0.5); }
  else { mom+=0.10*((((form[l.home]||0.5)+(form[l.away]||0.5))/2)-0.5); }
  return Math.max(0.01,Math.min(0.999,l.prob*(1+mom)));
}
function legHot(l,form,hot){
  if(l.type==='scorer'&&hot.has(l.player)) return '🔥';
  if(l.subj&&(form[l.subj]||0)>0.72) return '📈';
  return '';
}
function genParlay(){
  const cfg=PL_RISK[plProfile];
  const allowed=plScopeDates();
  let pool=buildLegs().filter(l=>(!allowed||allowed.has(l.date)) && plType[l.type]
    && inOdds(l.prob,plOddsMin,plOddsMax));   // odds range is the band
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const picked=[],um=new Set(),ut={};
  for(const l of pool){if(picked.length>=cfg.n)break;if(um.has(l.match))continue;if((ut[l.type]||0)>=2)continue;
    picked.push(l);um.add(l.match);ut[l.type]=(ut[l.type]||0)+1;}
  if(picked.length<cfg.n){for(const l of pool){if(picked.length>=cfg.n)break;if(picked.includes(l))continue;
    if(um.has(l.match))continue;picked.push(l);um.add(l.match);}}
  return picked;
}

      <span class="sclbl" style="margin-left:8px">Odds</span>

function wireAuto(el){

function buildHTML(){
  const form=teamForm(), hot=hotSet();

  let rows=pool.map(l=>{const[lk,lbl]=PL_LK[l.type];const added=inSlip.has(l.id);return `<div class="prow2">

      +`<div class="slipfoot"><div><div class="sod">${dec.toFixed(2)}×</div><div class="sim">${(comb*100).toFixed(1)}% · $10 → $${(10*dec).toFixed(2)}</div></div>
        <button class="clr" id="slipclear">Clear</button></div>`;
  }
  return `<div class="plsub"><b>Build your own.</b> Filter the prop pool and the algorithm ranks it by <b>confidence =

    <div class="bldwrap">

function wireBuild(el){

  const bmn=el.querySelector('#boddmin'), bmx=el.querySelector('#boddmax');
  if(bmn) bmn.addEventListener('change',e=>{plFlt.oddsMin=Math.max(1,+e.target.value||1);re();});
  if(bmx) bmx.addEventListener('change',e=>{plFlt.oddsMax=Math.max(plFlt.oddsMin,+e.target.value||99);re();});

    const id=b.dataset.id;
    if(SLIP.some(s=>s.id===id)){SLIP=SLIP.filter(s=>s.id!==id);}

}

let upScorers=false;
function renderUpcoming(){
  const el=document.getElementById('upcoming');
  const sortKey=m=>m.kickoff || (m.date+'T12:00:00Z');
  const ms=DATA.matches.filter(m=>m.status==='upcoming')
    .sort((a,b)=>sortKey(a)<sortKey(b)?-1:sortKey(a)>sortKey(b)?1:0);   // by date+kickoff, ALL games
  if(!ms.length){el.innerHTML='<div class="loading">No upcoming games — group stage complete.</div>';return;}
  const fmt=d=>{const x=new Date(d+'T12:00:00');return x.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});};
  const fmtTime=m=>m.kickoff? new Date(m.kickoff).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}) : '';
  const rank={}; DATA.teams.forEach(t=>rank[t.name]=t.fifa_rank);
  // Upset watch: clear ranking gap, but the lower-ranked side still has a real chance to get a result.
  const upsetTag=(m)=>{
    const homeFav=m.home_win>=m.away_win;
    const dogNoLose=(homeFav? m.away_win:m.home_win)+m.draw;        // underdog win% + draw%
    const favRank=Math.min(rank[m.home]||50, rank[m.away]||50);     // is the favorite a real contender?
    const gap=Math.abs((rank[m.home]||50)-(rank[m.away]||50));
    // clear favorite (not a coin-flip) who is still beatable: underdog 28–45% to get a result
    return (favRank<=18 && gap>=12 && dogNoLose>=28 && dogNoLose<=45)
      ? '<span class="upset" title="A genuine contender favored but beatable — the underdog has a real shot at a result. World Cup upset territory.">🎲 Upset watch</span>' : '';
  };
  const scol=(title,list)=>{
    let h=`<div class="uscol"><h5>${title}</h5>`;
    if(!list||!list.length){h+='<div class="sr"><span class="sn">—</span></div></div>';return h;}
    const max=list[0].pct||1;
    list.slice(0,3).forEach(s=>{h+=`<div class="sr"><span class="sn">${s.name}</span>
      <span class="sb"><i style="width:${Math.min(100,s.pct/max*100)}%"></i></span>
      <span class="sp">${s.pct}%</span></div>`;});
    return h+'</div>';
  };
  let html=`<div class="upsub"><b>Upcoming games</b> — every remaining group match in kickoff order (your local time),
    each with a projected scoreline and win %. ${ms.length} games left.
    <button id="uptoggle" class="uptoggle">${upScorers?'Hide':'Show'} scorer predictions</button></div>`;
  let curDate='';
  ms.forEach(m=>{
    if(m.date!==curDate){
      if(curDate) html+='</div>';
      curDate=m.date;
      html+=`<div class="udate">${fmt(m.date)}</div><div class="ugrid">`;
    }
    html+=`<div class="ucard"><div class="uhead"><span class="ug">Group ${m.group} ${upsetTag(m)}</span>
      <span>${fmtTime(m)} · ${m.venue_city}</span></div>
      <div class="uteams"><span class="ut h">${m.home}${flag(m.home)}</span>
        <span class="usc">${m.proj_home}–${m.proj_away}</span>
        <span class="ut a">${flag(m.away)}${m.away}</span></div>
      <div class="uwdl"><i class="w" style="width:${m.home_win}%"></i><i class="d" style="width:${m.draw}%"></i><i class="l" style="width:${m.away_win}%"></i></div>
      <div class="uwpc"><span>${m.home_win}%</span><span>draw ${m.draw}%</span><span>${m.away_win}%</span></div>
      ${upScorers?`<div class="uscorers">${scol(m.home+' scorers',m.scorers_home)}${scol(m.away+' scorers',m.scorers_away)}</div>`:''}
      </div>`;
  });
  if(curDate) html+='</div>';
  el.innerHTML=html;
  const tg=document.getElementById('uptoggle');
  if(tg) tg.addEventListener('click',()=>{upScorers=!upScorers;renderUpcoming();});
}

// ====================================================================
//  IN-BROWSER PREDICTION ENGINE — recomputes everything live from the feed
//  (faithful port of simulate.py so the page is always current, no server needed)
// ====================================================================
let STATIC=null;
const ENG=(function(){
  const OFF_R32=[[73,"2A","2B"],[74,"1E",["3","ABCDF"]],[75,"1F","2C"],[76,"1C","2F"],
    [77,"1I",["3","CDFGH"]],[78,"2E","2I"],[79,"1A",["3","CEFHI"]],[80,"1L",["3","EHIJK"]],
    [81,"1D",["3","BEFIJ"]],[82,"1G",["3","AEHIJ"]],[83,"2K","2L"],[84,"1H","2J"],
    [85,"1B",["3","EFGIJ"]],[86,"1J","2H"],[87,"1K",["3","DEIJL"]],[88,"2D","2G"]];
  const OFF_LATER=[[89,74,77],[90,73,75],[91,76,78],[92,79,80],[93,83,84],[94,81,82],[95,86,88],[96,85,87],
    [97,89,90],[98,93,94],[99,91,92],[100,95,96],[101,97,98],[102,99,100],[104,101,102]];
  const OFF_FEED={}; OFF_LATER.forEach(([m,a,b])=>OFF_FEED[m]=[a,b]);
  const THIRD_CANDS={74:"ABCDF",77:"CDFGH",79:"CEFHI",80:"EHIJK",81:"BEFIJ",82:"AEHIJ",85:"EFGIJ",87:"DEIJL"};
  const DISP={R32:[74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87],R16:[89,90,93,94,91,92,95,96],
    QF:[97,98,99,100],SF:[101,102],Final:[104]};
  const PER={hot:7,temp:0,cold:-7,alt:-2}, HOSTS={USA:"USA",Mexico:"MEX",Canada:"CAN"}, MAXG=9;
  const fact=n=>{let f=1;for(let i=2;i<=n;i++)f*=i;return f;};
  const pois=(k,l)=>Math.exp(-l)*Math.pow(l,k)/fact(k);
  const sumF=f=>(f.formation||0)+(f.depth||0)+(f.playstyle||0)+(f.captain||0)+(f.endurance||0);

  function make(S){
    const C=S.consts, V=S.venues, T={}; S.teams.forEach(t=>T[t.name]=t);
    const GROUPS=[...new Set(S.teams.map(t=>t.group))].sort();
    const groupTeams={}; GROUPS.forEach(g=>groupTeams[g]=S.teams.filter(t=>t.group===g).map(t=>t.name));
    const strn=n=>T[n].base_rating+sumF(T[n].factors);
    let FORM={};
    function climate(tm,ven){const v=V[ven];let h=Math.max(0,(v.heat||0)-(v.roof?1:0));
      const per=0.45*PER[tm.climate]+0.55*PER[tm.club_climate||tm.climate];
      let a=h*per+(tm.factors.endurance||0)*h*0.3; if(v.altitude)a+=tm.climate==='alt'?22:-16; return a;}
    function sr(name,ven,home){const tm=T[name];let r=tm.base_rating+sumF(tm.factors)+climate(tm,ven);
      if(HOSTS[name]===V[ven].country)r+=C.HOST; if(home)r+=C.NOMHOME; return r;}
    const eff=(n,ven,home)=>sr(n,ven,home)+(FORM[n]||0);
    function expG(h,a,ven){let s=((eff(h,ven,true)-eff(a,ven,false))/C.SUPDIV)*(1-C.UPSET);
      return [Math.max(0.18,C.AVG/2+s/2),Math.max(0.18,C.AVG/2-s/2)];}
    function mProbs(h,a,ven){const[lh,la]=expG(h,a,ven);const ph=[],pa=[];
      for(let i=0;i<=MAXG;i++){ph.push(pois(i,lh));pa.push(pois(i,la));}
      let pw=0,pd=0,pl=0,best=[0,0],bp=-1;
      for(let i=0;i<=MAXG;i++)for(let j=0;j<=MAXG;j++){const p=ph[i]*pa[j];if(p>bp){bp=p;best=[i,j];}
        if(i>j)pw+=p;else if(i===j)pd+=p;else pl+=p;}
      return {home_win:Math.round(pw*1000)/10,draw:Math.round(pd*1000)/10,away_win:Math.round(pl*1000)/10,
        exp_home:Math.round(lh*100)/100,exp_away:Math.round(la*100)/100,proj_home:best[0],proj_away:best[1]};}
    function pdraw(l){let L=Math.exp(-l),k=0,p=1;for(;;){k++;p*=Math.random();if(p<=L)return k-1;}}
    const sample=(h,a,ven)=>[pdraw(expG(h,a,ven)[0]),pdraw(expG(h,a,ven)[1])];
    function koWin(a,b,ven){ven=ven||"New York New Jersey Stadium";const[la,lb]=expG(a,b,ven);let ga=pdraw(la),gb=pdraw(lb);
      if(ga>gb)return a;if(gb>ga)return b;const p=1/(1+Math.pow(10,-(eff(a,ven,true)-eff(b,ven,false))/400));
      return Math.random()<p?a:b;}
    function computeForm(fix){const adj={};S.teams.forEach(t=>adj[t.name]=0);
      fix.filter(m=>m.result).slice().sort((a,b)=>a.date<b.date?-1:1).forEach(m=>{
        const[gh,ga]=m.result;const eh=sr(m.home,m.venue,true)+adj[m.home],ea=sr(m.away,m.venue,false)+adj[m.away];
        const ex=1/(1+Math.pow(10,-(eh-ea)/400)),sc=gh>ga?1:gh===ga?0.5:0,mu=1+0.5*Math.log(Math.max(1,Math.abs(gh-ga)));
        const d=26*mu*(sc-ex);adj[m.home]+=d;adj[m.away]-=d;});
      for(const k in adj)adj[k]=Math.max(-120,Math.min(120,adj[k]));return adj;}
    function table(fix,mode){ // mode: 'played'|'modal'|'sample'
      const tbl={};GROUPS.forEach(g=>{const rec={};groupTeams[g].forEach(n=>rec[n]={P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0});
        fix.filter(m=>m.group===g).forEach(m=>{let r=m.result;
          if(!r){ if(mode==='sample')r=sample(m.home,m.away,m.venue);
            else if(mode==='modal'){const mp=mProbs(m.home,m.away,m.venue);r=[mp.proj_home,mp.proj_away];} else return; }
          const[gh,ga]=r;[[m.home,gh,ga],[m.away,ga,gh]].forEach(([n,gf,gaa])=>{rec[n].P++;rec[n].GF+=gf;rec[n].GA+=gaa;});
          if(gh>ga){rec[m.home].W++;rec[m.home].Pts+=3;rec[m.away].L++;}
          else if(ga>gh){rec[m.away].W++;rec[m.away].Pts+=3;rec[m.home].L++;}
          else{rec[m.home].D++;rec[m.away].D++;rec[m.home].Pts++;rec[m.away].Pts++;}});
        const order=Object.keys(rec).sort((a,b)=>{const ra=rec[a],rb=rec[b];
          return (rb.Pts-ra.Pts)||((rb.GF-rb.GA)-(ra.GF-ra.GA))||(rb.GF-ra.GF)||(mode==='sample'?Math.random()-0.5:strn(b)-strn(a));});
        tbl[g]=order.map(n=>[n,rec[n]]);});return tbl;}
    function assignThirds(groups){const slots=Object.keys(THIRD_CANDS).map(Number),avail=new Set(groups),res={};
      function bt(i,used){if(i===slots.length)return true;const mid=slots[i];
        for(const g of THIRD_CANDS[mid]){if(avail.has(g)&&!used.has(g)){res[mid]=g;
          if(bt(i+1,new Set([...used,g])))return true;delete res[mid];}}return false;}
      if(!bt(0,new Set())){const lo=[...avail];slots.forEach(m=>{if(!res[m]&&lo.length)res[m]=lo.pop();});}return res;}
    function playOfficial(slot,third,decide){const m={};
      OFF_R32.forEach(([id,sA,sB])=>{const a=Array.isArray(sA)?third[id]:slot[sA],b=Array.isArray(sB)?third[id]:slot[sB];
        m[id]={a,b,winner:decide(a,b)};});
      OFF_LATER.forEach(([id,fa,fb])=>{const a=m[fa].winner,b=m[fb].winner;m[id]={a,b,winner:decide(a,b)};});
      return [m,m[104].winner];}
    function bestThirds(tbl,rnd){const th=GROUPS.map(g=>{const[n,r]=tbl[g][2];return [n,g,r.Pts,r.GF-r.GA,r.GF];});
      th.sort((a,b)=>(b[2]-a[2])||(b[3]-a[3])||(b[4]-a[4])||(rnd?Math.random()-0.5:strn(b[0])-strn(a[0])));return th.slice(0,8);}
    function slotsFrom(tbl,best){const slot={};GROUPS.forEach(g=>{slot["1"+g]=tbl[g][0][0];slot["2"+g]=tbl[g][1][0];});
      const assign=assignThirds(best.map(t=>t[1])),tg={};best.forEach(t=>tg[t[1]]=t[0]);
      const third={};for(const mid in assign)third[mid]=tg[assign[mid]];return [slot,third];}

    return {GROUPS,groupTeams,T,strn,mProbs,table,computeForm,setForm:f=>FORM=f,getForm:()=>FORM,
      sample,koWin,bestThirds,slotsFrom,playOfficial,eff,OFF_R32,OFF_LATER,OFF_FEED,DISP,
      assembleDATA:function(fix,scorers){
        FORM=computeForm(fix);
        const teamsOut={};S.teams.forEach(t=>{teamsOut[t.name]={name:t.name,group:t.group,code:t.code,fifa_rank:t.fifa_rank,
          base_rating:t.base_rating,rating_full:Math.round(t.base_rating+sumF(t.factors)+(FORM[t.name]||0)),
          form_adj:Math.round(FORM[t.name]||0),factors:t.factors,climate:t.climate,note:t.note||'',
          adv:{R16:0,QF:0,SF:0,F:0,CH:0},fin:{first:0,second:0}};});
        // matches
        const matches=fix.map(m=>{const rec={date:m.date,kickoff:m.kickoff,group:m.group,home:m.home,away:m.away,
          venue:m.venue,venue_city:(V[m.venue]||{}).city||''};
          if(m.result){rec.status='played';rec.score_home=m.result[0];rec.score_away=m.result[1];
            rec.result=m.result[0]>m.result[1]?'H':m.result[1]>m.result[0]?'A':'D';}
          else{rec.status='upcoming';Object.assign(rec,mProbs(m.home,m.away,m.venue));
            rec.scorers_home=scorerProbs(m.home,rec.exp_home);rec.scorers_away=scorerProbs(m.away,rec.exp_away);}
          return rec;});
        function scorerProbs(team,lam){const atk=S.attackers[team]||[];const wsum=atk.reduce((a,x)=>a+x[1],0)||1;
          return atk.map(([nm,w])=>({name:nm,pct:Math.round((1-Math.exp(-lam*(1-C.OTHER)*w/wsum))*1000)/10}))
            .sort((a,b)=>b.pct-a.pct).slice(0,5);}
        // current standings
        const cur=table(fix,'played');const groups={};
        GROUPS.forEach(g=>{groups[g]=cur[g].map(([n,r],i)=>({name:n,P:r.P,W:r.W,D:r.D,L:r.L,GF:r.GF,GA:r.GA,Pts:r.Pts,GD:r.GF-r.GA}));});
        // Monte Carlo
        const N=C.NSIMS;
        for(let s=0;s<N;s++){const tbl=table(fix,'sample');const best=bestThirds(tbl,true);
          const[slot,third]=slotsFrom(tbl,best);const[mm]=playOfficial(slot,third,koWin);
          GROUPS.forEach(g=>{teamsOut[tbl[g][0][0]].fin.first++;teamsOut[tbl[g][1][0]].fin.second++;});
          for(let i=73;i<89;i++)teamsOut[mm[i].winner].adv.R16++;
          for(let i=89;i<97;i++)teamsOut[mm[i].winner].adv.QF++;
          for(let i=97;i<101;i++)teamsOut[mm[i].winner].adv.SF++;
          for(let i=101;i<103;i++)teamsOut[mm[i].winner].adv.F++;
          teamsOut[mm[104].winner].adv.CH++;}
        const teams=Object.values(teamsOut).map(t=>({name:t.name,group:t.group,code:t.code,fifa_rank:t.fifa_rank,
          base_rating:t.base_rating,rating_full:t.rating_full,form_adj:t.form_adj,factors:t.factors,climate:t.climate,note:t.note,
          p_win_group:Math.round(t.fin.first/N*1000)/10,p_top2:Math.round((t.fin.first+t.fin.second)/N*1000)/10,
          p_advance:Math.round(t.adv.R16/N*1000)/10,p_qf:Math.round(t.adv.QF/N*1000)/10,p_sf:Math.round(t.adv.SF/N*1000)/10,
          p_final:Math.round(t.adv.F/N*1000)/10,p_champion:Math.round(t.adv.CH/N*1000)/10}))
          .sort((a,b)=>b.p_champion-a.p_champion);
        const tByName={};teams.forEach(t=>tByName[t.name]=t);
        GROUPS.forEach(g=>groups[g].forEach(r=>{r.p_advance=tByName[r.name].p_advance;r.p_win_group=tByName[r.name].p_win_group;r.form_adj=tByName[r.name].form_adj;}));
        // deterministic projected bracket
        const mtbl=table(fix,'modal'),best=bestThirds(mtbl,false),btSet=new Set(best.map(t=>t[0]));
        const seedLbl={},grpOf={};GROUPS.forEach(g=>{seedLbl[mtbl[g][0][0]]="1"+g;seedLbl[mtbl[g][1][0]]="2"+g;
          grpOf[mtbl[g][0][0]]=g;grpOf[mtbl[g][1][0]]=g;});best.forEach(t=>{seedLbl[t[0]]="3"+t[1];grpOf[t[0]]=t[1];});
        const[slot,third]=slotsFrom(mtbl,best);
        const fav=(a,b)=>{const mp=mProbs(a,b,"New York New Jersey Stadium");return mp.home_win>=mp.away_win?a:b;};
        const[mm,champion]=playOfficial(slot,third,fav);
        const detail=id=>{const a=mm[id].a,b=mm[id].b,mp=mProbs(a,b,"New York New Jersey Stadium");
          const tot=mp.home_win+mp.away_win||1,pah=Math.round(mp.home_win/tot*1000)/10;
          const d={id,a,b,pa:pah,pb:Math.round((100-pah)*10)/10,winner:mm[id].winner,la:seedLbl[a]||'',lb:seedLbl[b]||'',
            ga:grpOf[a]||'',gb:grpOf[b]||'',sa:mp.proj_home,sb:mp.proj_away};
          if(OFF_FEED[id]){d.fa=OFF_FEED[id][0];d.fb=OFF_FEED[id][1];}return d;};
        const rounds=["R32","R16","QF","SF","Final"].map(rn=>({name:rn,matches:DISP[rn].map(detail)}));
        const proj_standings={};GROUPS.forEach(g=>{proj_standings[g]=mtbl[g].map(([n,r],i)=>({name:n,pos:i+1,P:r.P,
          pts:r.Pts,gd:r.GF-r.GA,adv:(i<2)||(i===2&&btSet.has(n)),seed:seedLbl[n]||''}));});
        // players
        const stars=(S.stars||[]).map(s=>Object.assign({},s));
        const gp={};fix.filter(m=>m.result).forEach(m=>{gp[m.home]=(gp[m.home]||0)+1;gp[m.away]=(gp[m.away]||0)+1;});
        const sg={};scorers.forEach(s=>sg[asciiName(s.name)]=s.g);
        stars.forEach(s=>{const n=gp[s.team]||0;s.g=sg[asciiName(s.name)]!=null?sg[asciiName(s.name)]:0;
          s.team_gp=n;s.exp_now=Math.round(s.proj_g*n/3*100)/100;const diff=s.g-s.exp_now;
          s.status=diff>0.35?'ahead':diff<-0.35?'behind':'on';});
        const played=fix.filter(m=>m.result).length;
        const champ=teams[0];
        return {meta:{generated:new Date().toISOString(),n_sims:N,matches_played:played,matches_total:fix.length,
            favourite:champ.name,favourite_pct:champ.p_champion,live:true},
          teams,matches,groups,bracket:{rounds,champion,proj_standings},
          players:{scorers,stars,as_of:new Date().toISOString().slice(0,10)}};
      }};
  }
  return {make};
})();
function asciiName(s){return (s||'').normalize('NFKD').replace(/[̀-ͯ]/g,'').trim();}

// ---- live feed -> results + scorers, then recompute DATA ----
async function recomputeLive(opts){
  opts=opts||{};
  const btn=document.getElementById('refreshbtn');
  if(btn){btn.disabled=true;btn.textContent='⟳ Updating…';}
  let feed=null;
  try{ feed=await fetch(FEED_URL+'?_='+Date.now()).then(r=>r.json()); }catch(e){ feed=null; }
  if(feed && STATIC){
    try{
      const resMap={};
      feed.matches.forEach(m=>{ if((m.group||'').startsWith('Group') && (m.score||{}).ft){
        const h=fname(m.team1),a=fname(m.team2);resMap[[h,a].sort().join('|')]={a:h,s:m.score.ft};}});
      const fix=STATIC.fixtures.map(f=>{const k=[f.home,f.away].sort().join('|');const o=Object.assign({},f);
        if(resMap[k]){const r=resMap[k];o.result=r.a===f.home?[r.s[0],r.s[1]]:[r.s[1],r.s[0]];}else o.result=null;return o;});
      const gl={};feed.matches.forEach(m=>{if(!((m.score||{}).ft))return;[['goals1',fname(m.team1)],['goals2',fname(m.team2)]].forEach(([key,tm])=>{
        (m[key]||[]).forEach(g=>{const nm=asciiName((g.name||'').replace('(pen)','').replace('(og)',''));if(!nm)return;
          if(!gl[nm])gl[nm]=[0,tm];gl[nm][0]++;});});});
      const scorers=Object.keys(gl).map(n=>({name:n,team:gl[n][1],g:gl[n][0],a:0})).sort((x,y)=>y.g-x.g);
      const eng=ENG.make(STATIC);
      DATA=eng.assembleDATA(fix,scorers);
      renderAll();
      if(btn){btn.textContent='✓ Updated';setTimeout(()=>{btn.disabled=false;btn.textContent='⟳ Refresh scores';},1500);}
      return true;
    }catch(e){ console.warn('recompute failed',e); }
  }
  if(btn){btn.disabled=false;btn.textContent='⟳ Refresh scores';}
  return false;
}
function renderAll(){renderMeta();renderGroups();renderUpcoming();renderParlay();renderBracket();renderPlayers();renderKnockout();renderTitle();}

function boot(){
  try{
    DATA=JSON.parse(document.getElementById('wc-data').textContent);
    try{STATIC=JSON.parse(document.getElementById('wc-static').textContent);}catch(e){STATIC=null;}
    renderAll();
  }catch(e){
    document.getElementById('groups').innerHTML=
      '<div class="loading">No data baked in — run <code>python simulate.py</code> to generate index.html.</div>';
    return;
  }
  // then refresh live from the feed (no setup needed) so results/odds are always current
  recomputeLive({silent:true});
}
boot();
